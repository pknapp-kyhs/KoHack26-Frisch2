{% extends "layout.html" %}
{% block container_class %}auth-container{% endblock %}
{% block content %}
<div class="card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="margin-bottom: 0.5rem;">Join the Pro’s</h2>
        <p style="color: var(--text-muted); font-size: 0.875rem;">Get started with $10,000 in demo capital</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Choose Username</label>
            <input type="text" name="username" placeholder="trader_zero" required autofocus>
        </div>
        <div class="form-group">
            <label>Create Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn mt-4">Create Account</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
        <span style="color: var(--text-muted);">Already have an account?</span>
        <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Log in here</a>
    </div>
</div>
{% endblock %}
