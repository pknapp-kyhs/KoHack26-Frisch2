{% extends "layout.html" %}
{% block container_class %}auth-container{% endblock %}
{% block content %}
<div class="card">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: var(--text-muted); font-size: 0.875rem;">Enter your credentials to access your account</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Username" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>
        </div>
        
        <button type="submit" class="btn mt-4">Sign In</button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
        <span style="color: var(--text-muted);">Don't have an account?</span>
        <a href="{{ url_for('signup') }}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create one</a>
    </div>
</div>
{% endblock %}
