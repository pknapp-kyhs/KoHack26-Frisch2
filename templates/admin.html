{% extends 'base.html' %}

{% block title %}
    Admin Pannel
{% endblock %}

{% block content %}
    <h3>Current users:</h3>
    <ul>
    {% for user in USERS %}
        <li>
            {{ user.username }} 
            <form action="{{ url_for('delete_user', username=user.username) }}" method="POST" style="display:inline;">
                <button type="submit">Remove User</button>
            </form>
        </li>
    {% endfor %}
    </ul>
{% endblock %}
