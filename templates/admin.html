{% extends 'base.html' %}

{% block title %}
    Admin Pannel
{% endblock %}

{% block content %}
    <h1>Admin Panel</h1>
    <br><br><br>
    <!-- List every session user and allow removals for testing/demo purposes. -->
    <h3>Current users:</h3>
    <ul>
    {% for user in USERS %}
        <li>
            {{ user.username }} 
            <!-- Send a POST to delete the selected user entry. -->
            <form action="{{ url_for('delete_user', username=user.username) }}" method="POST" style="display:inline;">
                <button type="submit">Remove User</button>
            </form>
        </li>
    {% endfor %}
    </ul>
{% endblock %}
