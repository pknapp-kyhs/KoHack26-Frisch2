<!DOCTYPE html>
<html>
<head>
    <title>Voice Query</title>
    <!-- Socket.IO Client Library -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <h1>Voice Search</h1>
    <button id="recordBtn">Click to Ask (Mic)</button>
    <p>Status: <span id="status">Idle</span></p>
    <p>Text: <span id="output">...</span></p>

    <script>
        const socket = io();
        let audioContext;
        let processor;
        let microphone;

        // 🔊 TEXT-TO-SPEECH FUNCTION
        function speak(text) {
            if (!text) return;

            // Stop any current speech
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1;

            speechSynthesis.speak(utterance);
        }

        async function startStreaming() {
            document.getElementById('status').innerText = "Listening...";
            
            // 1. Get Mic Access
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            // 2. Set up Audio Processing (16kHz for Vosk)
            audioContext = new AudioContext({ sampleRate: 16000 });
            microphone = audioContext.createMediaStreamSource(stream);
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            microphone.connect(processor);
            processor.connect(audioContext.destination);

            // 3. Convert and Send Loop
            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(inputData.length);
                
                for (let i = 0; i < inputData.length; i++) {
                    pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                }
                
                socket.emit('audio_stream', pcmData.buffer);
            };
        }

        document.getElementById('recordBtn').onclick = () => {
            if (!audioContext) {
                startStreaming();
            } else {
                processor.disconnect();
                microphone.disconnect();
                audioContext.close();
                audioContext = null;
                document.getElementById('status').innerText = "Stopped";
            }
        };

        // 🧠 SHOW FINAL TRANSCRIPT
        socket.on('transcript_result', (text) => {
            document.getElementById('output').innerText = text;
            document.getElementById('status').innerText = "Done!";
        });

        // 🔊 SPEAK RESPONSE FROM SERVER
        socket.on('speak_text', (text) => {
            speak(text);
        });

        // (Optional but recommended) live partial text
        socket.on('partial_result', (text) => {
            document.getElementById('output').innerText = text + "...";
        });
    </script>
</body>
</html>
